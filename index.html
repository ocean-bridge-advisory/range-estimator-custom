// Lightweight canvas speed chart — no external deps
function SpeedChart({
  data,
  color
}) {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.offsetWidth,
      H = canvas.offsetHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, W, H);
    if (!data || data.length < 2) return;
    const maxV = Math.max(...data.map(d => d.kmh), 1);
    const maxT = data[data.length - 1].t;
    const padL = 28,
      padR = 6,
      padT = 6,
      padB = 18;
    const cW = W - padL - padR,
      cH = H - padT - padB;
    // axes
    ctx.strokeStyle = '#27272a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(padL, padT);
    ctx.lineTo(padL, padT + cH);
    ctx.lineTo(padL + cW, padT + cH);
    ctx.stroke();
    // y ticks
    ctx.fillStyle = '#52525b';
    ctx.font = '9px monospace';
    ctx.textAlign = 'right';
    [0, 0.5, 1].forEach(f => {
      const y = padT + cH - f * cH,
        v = Math.round(f * maxV);
      ctx.fillText(v, padL - 3, y + 3);
      ctx.strokeStyle = '#27272a80';
      ctx.beginPath();
      ctx.moveTo(padL, y);
      ctx.lineTo(padL + cW, y);
      ctx.stroke();
    });
    // x ticks
    ctx.textAlign = 'center';
    ctx.strokeStyle = '#27272a';
    [0, 0.25, 0.5, 0.75, 1].forEach(f => {
      const x = padL + f * cW,
        t = Math.round(f * maxT);
      ctx.fillText(t + 's', x, padT + cH + 12);
    });
    // line
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    data.forEach((d, i) => {
      const x = padL + d.t / maxT * cW,
        y = padT + cH - d.kmh / maxV * cH;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
    // fill
    ctx.lineTo(padL + data[data.length - 1].t / maxT * cW, padT + cH);
    ctx.lineTo(padL, padT + cH);
    ctx.closePath();
    ctx.fillStyle = color + '18';
    ctx.fill();
  }, [data, color]);
  return React.createElement('canvas', {
    ref: canvasRef,
    style: {
      width: '100%',
      height: '150px',
      display: 'block'
    }

}
